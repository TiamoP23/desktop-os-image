name: PR Validate

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "bluebuild/**"
      - "justfile"
      - "manifests/**"
      - "patches/**"
      - "scripts/**"
  merge_group:

concurrency:
  group: pr-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Check YAML files
        run: |
          yq '.' .github/workflows/build.yml >/dev/null
          yq '.' .github/workflows/pr-validate.yml >/dev/null
          yq '.' bluebuild/recipes/main.yml >/dev/null
          yq '.' manifests/components.yml >/dev/null

      - name: Prepare generated tree
        run: bash ./scripts/prepare-components.sh

      - name: Check scaffold invariants
        run: |
          test -d bluebuild/files/generated
          test -f bluebuild/files/generated/.gitignore
          test -f bluebuild/recipes/main.yml
          test -f manifests/components.yml
          test -f scripts/component-edit.sh
          test -f scripts/prepare-components.sh

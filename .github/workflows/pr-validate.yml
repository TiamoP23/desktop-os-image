name: PR Validate

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "bluebuild/**"
      - "justfile"
      - "manifests/**"
      - "patches/**"
      - "renovate.json"
      - "scripts/**"
      - "vendor/**"
  merge_group:

concurrency:
  group: pr-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-scaffold:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive

      - name: Install prepare dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libglib2.0-bin gnome-shell zip unzip

      - name: Prepare generated tree
        run: bash ./scripts/prepare-components.sh

      - name: Check shell scripts
        run: bash -n scripts/*.sh bluebuild/files/static/scripts/*.sh

      - name: Check scaffold invariants
        run: |
          test -d bluebuild/files/generated
          test -f bluebuild/files/generated/.gitignore
          test -f bluebuild/recipes/main.yml
          test -f manifests/components.yml
          test -f scripts/component-edit.sh
          test -f scripts/prepare-components.sh

name: Build Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build.yml"
      - "bluebuild/**"
      - "justfile"
      - "manifests/**"
      - "patches/**"
      - "scripts/**"
      - "vendor/**"
  workflow_dispatch:

env:
  IMAGE_NAME: desktop-os-image
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: latest

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Install prepare dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libglib2.0-bin gnome-shell zip unzip

      - name: Prepare generated tree
        run: bash ./scripts/prepare-components.sh

      - name: Build and publish image
        uses: blue-build/github-action@v1
        with:
          working_directory: ./bluebuild
          skip_checkout: true
          recipe: main.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - type: dnf
    install:
      packages:
        - hydrapaper
  - type: files
    files:
      - source: static/system/etc/dconf
        destination: /etc/dconf
      - source: static/system/usr/share/doc/blur-my-shell
        destination: /usr/share/doc/blur-my-shell
      - source: generated/usr/share/gnome-shell/extensions
        destination: /usr/share/gnome-shell/extensions
      - source: static/scripts/rounded_blur_build.sh
        destination: /usr/local/bin/rounded_blur_build.sh
  - type: containerfile
    snippets:
      - RUN chmod +x /usr/local/bin/rounded_blur_build.sh
      - RUN dconf update
      - RUN dnf -y install bc git meson glib2-devel gobject-introspection mutter-devel @c-development && SKIP_DEPS=y /usr/local/bin/rounded_blur_build.sh -i && dnf -y remove bc git meson glib2-devel gobject-introspection mutter-devel && dnf -y groupremove c-development && dnf -y clean all

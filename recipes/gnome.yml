---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: gnome-extensions
    install:
      - Dash to Panel
  - type: dnf
    install:
      packages:
        - hydrapaper
  - type: containerfile
    snippets:
      - |
        RUN \
          --mount=from=build-blur-my-shell,source=/blur-my-shell/build/blur-my-shell@aunetx.shell-extension.zip,target=/tmp/blur-my-shell.zip \
          gnome-extensions install -f /tmp/blur-my-shell.zip
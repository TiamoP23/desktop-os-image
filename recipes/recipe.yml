---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: desktop-os-image
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/silverblue-nvidia
image-version: 44

stages:
  - name: build-base
    from: ghcr.io/ublue-os/silverblue-main:44
    modules:
      - type: dnf
        install:
          packages:
            - make
  - name: build-blur-my-shell
    from: build-base
    modules:
      - type: git
        source: local
        repo: https://github.com/aunetx/blur-my-shell.git
        branch: v71
        dest: ./blur-my-shell
      - type: script
        snippets:
          - cd blur-my-shell && make install

modules:
  - from-file: gnome.yml
  - from-file: podman.yml
  - type: containerfile
    snippets:
      - >
        RUN
          --mount=from=build-blur-my-shell,source=/blur-my-shell/build/blur-my-shell@aunetx.shell-extension.zip,target=/tmp/blur-my-shell.zip
          gnome-extensions install -f /tmp/blur-my-shell.zip

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
